# GoalKeeper Dash — entire backend stack via `docker compose up`.
# Schema self-builds (Hibernate ddl-auto=update) and the seeder runs on boot.
# The Expo mobile app is launched separately (see mobile/README.md).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goalkeeper}
      POSTGRES_USER: ${POSTGRES_USER:-gk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - gk_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gk} -d ${POSTGRES_DB:-goalkeeper}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-goalkeeper}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-gk}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev_only_change_me_this_must_be_at_least_32_bytes_long_xx}
      APP_JWT_ACCESS_TTL_MIN: ${APP_JWT_ACCESS_TTL_MIN:-30}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APP_OIDC_DEV_LOGIN_ENABLED: ${APP_OIDC_DEV_LOGIN_ENABLED:-true}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_SEED_SIMULATED_NATIONS: ${APP_SEED_SIMULATED_NATIONS:-true}
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-change_me}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:19006}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Optional DB UI — opt-in via the `tools` profile: `docker compose --profile tools up`.
  adminer:
    image: adminer
    profiles: ["tools"]
    ports:
      - "8090:8080"
    depends_on:
      - db

volumes:
  gk_pgdata:
