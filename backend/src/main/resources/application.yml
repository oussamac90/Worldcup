spring:
  application:
    name: goalkeeper-dash
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goalkeeper}
    username: ${SPRING_DATASOURCE_USERNAME:gk}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
    hikari:
      pool-name: gk-pool
      maximum-pool-size: 10
  jpa:
    hibernate:
      # dev/local: update (schema self-builds on `docker compose up`).
      # prod: set SPRING_JPA_HIBERNATE_DDL_AUTO=validate so schema changes are deliberate & reviewed.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  thymeleaf:
    cache: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,redis
        liveness:
          include: livenessState
      show-details: when_authorized
  info:
    env:
      enabled: true

# Structured JSON console logging with per-request traceId is configured in logback-spring.xml.

info:
  app:
    name: GoalKeeper Dash
    version: 1.0.0

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev_only_change_me_this_must_be_at_least_32_bytes_long_xx}
    access-ttl-min: ${APP_JWT_ACCESS_TTL_MIN:30}
    refresh-ttl-days: ${APP_JWT_REFRESH_TTL_DAYS:30}
    issuer: goalkeeper-dash
  oidc:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    facebook-app-id: ${FACEBOOK_APP_ID:}
    apple-client-id: ${APPLE_CLIENT_ID:}
    apple-team-id: ${APPLE_TEAM_ID:}
    # Allows a dev login path (no real IdP) when true. MUST be false in prod.
    dev-login-enabled: ${APP_OIDC_DEV_LOGIN_ENABLED:true}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    simulated-nations: ${APP_SEED_SIMULATED_NATIONS:true}
  admin:
    bootstrap-user: ${ADMIN_BOOTSTRAP_USER:admin}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:change_me}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,exp://localhost:19000}
  ratelimit:
    submit-per-minute: ${APP_RATELIMIT_SUBMIT_PER_MIN:30}
    auth-per-minute: ${APP_RATELIMIT_AUTH_PER_MIN:20}
  game:
    session-ttl-min: ${APP_GAME_SESSION_TTL_MIN:30}

