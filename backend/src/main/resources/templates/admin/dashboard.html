<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{admin/fragments :: nav('dashboard')}"></nav>
<div class="container">
    <h1>Dashboard</h1>
    <div th:if="${stats.activeSeason() == null}" class="error">No active season.</div>
    <div th:if="${stats.activeSeason() != null}" class="muted">
        Active season: <strong th:text="${stats.activeSeason().name()}"></strong>
    </div>
    <div class="cards">
        <div class="card"><div class="num" th:text="${stats.totalUsers()}">0</div><div class="label">Total users</div></div>
        <div class="card"><div class="num" th:text="${stats.dau()}">0</div><div class="label">DAU (24h)</div></div>
        <div class="card"><div class="num" th:text="${stats.newUsersLast24h()}">0</div><div class="label">New users (24h)</div></div>
        <div class="card"><div class="num" th:text="${stats.submissionsLast24h()}">0</div><div class="label">Submissions (24h)</div></div>
        <div class="card"><div class="num" th:text="${stats.totalSubmissions()}">0</div><div class="label">Total submissions</div></div>
        <div class="card"><div class="num" th:text="${#numbers.formatPercent(stats.flaggedRate(),1,1)}">0</div><div class="label">Flagged rate</div></div>
    </div>

    <h2>Per-nation contributions (active season)</h2>
    <table>
        <thead><tr><th>Nation</th><th>Contributors</th><th>Total score</th></tr></thead>
        <tbody>
        <tr th:each="c : ${stats.nationContributions()}">
            <td><span th:text="${c.nationCode()}"></span> — <span th:text="${c.nationName()}"></span></td>
            <td th:text="${c.contributorCount()}"></td>
            <td th:text="${c.totalScore()}"></td>
        </tr>
        <tr th:if="${stats.nationContributions().isEmpty()}"><td colspan="3" class="muted">No data yet.</td></tr>
        </tbody>
    </table>
</div>
</body>
</html>
