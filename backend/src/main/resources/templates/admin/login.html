<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('Admin Login')}"></head>
<body>
<div class="login-wrap">
    <h1>🧤 Admin Login</h1>
    <p class="error" th:if="${param.error}">Invalid username or password.</p>
    <p class="muted" th:if="${param.logout}">You have been logged out.</p>
    <form th:action="@{/admin/login}" method="post">
        <input type="text" name="username" placeholder="Username" autofocus required/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit" style="width:100%; margin-top:8px;">Sign in</button>
    </form>
</div>
</body>
</html>
